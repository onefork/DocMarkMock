<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DocMark - 智能文档转换</title>

  <!-- 设计令牌 -->
  <style id="theme-vars">
    :root {
      --color-primary: #2383E2;
      --color-primary-hover: #1A6FCA;
      --color-primary-light: #DBEAFE;
      --color-primary-muted: rgba(35, 131, 226, 0.12);
      --state-success: #0F7B6C;
      --state-success-light: #DBEDDB;
      --state-warning: #D9730D;
      --state-warning-light: #F6E3D2;
      --state-error: #E03E3E;
      --state-error-light: #FBE4E4;
      --state-info: #2383E2;
      --state-info-light: #DBEAFE;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F7F6F3;
      --bg-tertiary: #F1F1EF;
      --bg-hover: #F1F1EF;
      --bg-active: #E9E9E7;
      --border-default: #E9E9E7;
      --border-strong: #D3D1CC;
      --border-subtle: rgba(0, 0, 0, 0.04);
      --text-primary: #37352F;
      --text-secondary: #787774;
      --text-tertiary: #A39E99;
      --text-placeholder: #C3C2BF;
      --text-inverse: #FFFFFF;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-static: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-modal: 0 8px 32px rgba(0, 0, 0, 0.08);
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-size-display: 40px; --font-size-h1: 28px; --font-size-h2: 22px; --font-size-h3: 18px; --font-size-h4: 16px;
      --font-size-body: 15px; --font-size-caption: 13px; --font-size-small: 12px; --font-size-micro: 11px;
      --font-weight-regular: 400; --font-weight-medium: 500; --font-weight-semibold: 600; --font-weight-bold: 700;
      --line-height-tight: 1.25; --line-height-normal: 1.5; --line-height-relaxed: 1.65;
      --letter-spacing-tight: -0.02em; --letter-spacing-normal: 0em; --letter-spacing-wide: 0.02em;
      --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-10:40px;--space-12:48px;--space-16:64px;
    }

    /* 排版类 */
    .docmark-display {
      font-family: var(--font-sans);
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-bold);
      line-height: var(--line-height-tight);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--text-primary);
    }
    .docmark-h1 {
      font-family: var(--font-sans);
      font-size: var(--font-size-h1);
      font-weight: var(--font-weight-bold);
      line-height: var(--line-height-tight);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--text-primary);
    }
    .docmark-h2 {
      font-family: var(--font-sans);
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-tight);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--text-primary);
    }
    .docmark-h3 {
      font-family: var(--font-sans);
      font-size: var(--font-size-h3);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-tight);
      letter-spacing: var(--letter-spacing-normal);
      color: var(--text-primary);
    }
    .docmark-h4 {
      font-family: var(--font-sans);
      font-size: var(--font-size-h4);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-normal);
      letter-spacing: var(--letter-spacing-normal);
      color: var(--text-primary);
    }
    .docmark-body {
      font-family: var(--font-sans);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-regular);
      line-height: var(--line-height-normal);
      letter-spacing: var(--letter-spacing-normal);
      color: var(--text-primary);
    }
    .docmark-caption {
      font-family: var(--font-sans);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-regular);
      line-height: var(--line-height-normal);
      letter-spacing: var(--letter-spacing-normal);
      color: var(--text-secondary);
    }
    .docmark-small {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-regular);
      line-height: var(--line-height-normal);
      letter-spacing: var(--letter-spacing-normal);
      color: var(--text-secondary);
    }
    .docmark-mono {
      font-family: var(--font-mono);
    }

    /* 全局 base */
    body {
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>

  <!-- Tailwind CSS v4 browser build -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

  <!-- Tailwind 主题映射 -->
  <style type="text/tailwindcss">
    @theme inline {
      --color-primary: var(--color-primary);
    }
    @layer base {
      html, body { margin: 0; padding: 0; }
    }
  </style>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <!-- marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- jspdf -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <!-- docx -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8/build/index.umd.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
